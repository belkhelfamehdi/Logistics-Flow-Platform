apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: logistics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: inventory-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "default"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: logistics
spec:
  ports:
    - port: 8082
      targetPort: 8082
  selector:
    app: inventory-service