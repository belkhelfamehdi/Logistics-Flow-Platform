apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: logistics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: config-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8880
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: logistics
spec:
  ports:
    - port: 8880
      targetPort: 8880
  selector:
    app: config-server