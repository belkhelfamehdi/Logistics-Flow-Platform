apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: logistics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: order-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "default"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: logistics
spec:
  ports:
    - port: 8081
      targetPort: 8081
  selector:
    app: order-service